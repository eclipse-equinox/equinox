source.. = src/,\
           osgi/
output.. = bin/
bin.includes = META-INF/,\
               .,\
               hookconfigurators.properties,\
               about.html,\
               fragment.properties

## Configuration for TCK tests to execute for this project
pom.model.property.tck.artifact = org.osgi.test.cases.serviceloader,org.eclipse.osgi
pom.model.property.surefire.testArgLine = -Dosgi.framework.extensions=reference:file:${project.build.directory}/${project.artifactId}-${project.version}.jar
